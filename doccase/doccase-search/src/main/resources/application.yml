server:
  port: 8085

spring:
  application:
    name: doccase-search
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
      config:
        server-addr: ${NACOS_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
        file-extension: yaml
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis123}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: 5672
    username: ${RABBITMQ_USER:doccase}
    password: ${RABBITMQ_PASSWORD:doccase123}
    virtual-host: /doccase
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 10
    publisher-confirm-type: correlated
    publisher-returns: true

elasticsearch:
  host: ${ES_HOST:localhost}
  port: ${ES_PORT:9200}
  username: ${ES_USERNAME:}
  password: ${ES_PASSWORD:}
  index-name: doccase_documents
  alias-name: doccase_documents
  reindex:
    batch-size: 1000
    scroll-timeout: 5m
  search:
    hybrid-alpha: 0.7
    max-knn-candidates: 100

embedding:
  service-url: ${EMBEDDING_SERVICE_URL:http://localhost:8090/embed}
  model: text2vec-base-chinese
  dimensions: 768
  batch-size: 32
  cache-ttl-hours: 24

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.doccase.search: DEBUG
