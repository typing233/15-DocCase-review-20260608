server:
  port: 8086

spring:
  application:
    name: doccase-ocr
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
      config:
        server-addr: ${NACOS_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
        file-extension: yaml
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/doccase_ocr?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8mb4
    username: ${MYSQL_USER:doccase}
    password: ${MYSQL_PASSWORD:doccase123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis123}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: 5672
    username: ${RABBITMQ_USER:doccase}
    password: ${RABBITMQ_PASSWORD:doccase123}
    virtual-host: /doccase
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 5
        retry:
          enabled: true
          initial-interval: 2000
          max-attempts: 3
          multiplier: 2.0
    publisher-confirm-type: correlated
    publisher-returns: true

mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id

doccase:
  storage:
    minio:
      endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${MINIO_ACCESS_KEY:doccase}
      secret-key: ${MINIO_SECRET_KEY:doccase123456}
      bucket: doccase
  ocr:
    tesseract:
      data-path: ${TESSERACT_DATA_PATH:/usr/share/tesseract-ocr/4.00/tessdata}
      command: ${TESSERACT_CMD:tesseract}
      timeout: 120
    paddle-ocr:
      endpoint: ${PADDLEOCR_ENDPOINT:http://localhost:8866}
      command: ${PADDLEOCR_CMD:paddleocr}
      use-http: true
      timeout: 180

logging:
  level:
    com.doccase.ocr: DEBUG
